name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx expo lint
        env:
          # Provide dummy values so env vars resolve during lint
          EXPO_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: placeholder
          EXPO_PUBLIC_DISCOGS_CONSUMER_KEY: placeholder
          EXPO_PUBLIC_DISCOGS_CONSUMER_SECRET: placeholder
          EXPO_PUBLIC_GOOGLE_VISION_API_KEY: placeholder
